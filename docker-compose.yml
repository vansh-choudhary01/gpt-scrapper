version: "3.8"

services:
  app:
    build: .
    container_name: gpt-app
    restart: always
    volumes:
      - ./auth:/app/auth
    networks:
      - gpt-network

  nginx:
    image: nginx:latest
    container_name: gpt-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/www:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - gpt-network

networks:
  gpt-network: