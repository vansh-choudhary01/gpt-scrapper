version: "3.8"

services:
  app:
    build: .
    container_name: gpt-app
    restart: always
    volumes:
      - ./auth:/app/auth
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:latest
    container_name: gpt-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app